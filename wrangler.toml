# Cloudflare Workers — Static Assets configuration for NizamOk (نظامك)
# Assets-only Worker (no server script). Everything deployable lives in ./site.
# _headers and _redirects inside ./site are honored by Workers Static Assets.
name = "nizamok-purchase-webhook"
compatibility_date = "2026-07-01"
preview_urls = true
workers_dev = false

[assets]
directory = "./site"
not_found_handling = "404-page"
